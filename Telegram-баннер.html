<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#0B1020;color:#E8ECF6;position:relative}
  .glow1{position:absolute;top:-260px;left:-120px;width:760px;height:760px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(99,102,241,.55),transparent 70%);filter:blur(10px)}
  .glow2{position:absolute;bottom:-280px;right:-160px;width:780px;height:780px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(6,182,212,.4),transparent 70%);filter:blur(10px)}
  .grid-bg{position:absolute;inset:0;background-image:
    linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:54px 54px}
  .wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:78px 80px}
  .logo{font-size:30px;font-weight:800;letter-spacing:.5px}
  .grad{background:linear-gradient(120deg,#818CF8,#C084FC 45%,#22D3EE);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .pill{display:inline-flex;align-items:center;gap:12px;margin-top:8px;padding:12px 24px;
    border:1px solid rgba(255,255,255,.14);border-radius:999px;font-size:21px;color:#9AA6C4;
    background:rgba(255,255,255,.04);align-self:flex-start}
  .pill .dot{width:12px;height:12px;border-radius:50%;background:#22C55E;box-shadow:0 0 16px #22C55E}
  .mid{flex:1;display:flex;flex-direction:column;justify-content:center}
  h1{font-size:82px;line-height:1.04;font-weight:800;letter-spacing:-1.5px}
  .sub{font-size:30px;color:#9AA6C4;margin-top:30px;max-width:820px;line-height:1.4}
  .tags{display:flex;flex-wrap:wrap;gap:16px;margin-top:46px}
  .tag{font-size:24px;font-weight:600;padding:14px 26px;border-radius:16px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
  .footer{display:flex;align-items:center;justify-content:space-between}
  .price{font-size:30px;font-weight:700}
  .price .from{color:#9AA6C4;font-weight:500;font-size:24px}
  .cta{display:flex;align-items:center;gap:16px;font-size:30px;font-weight:700;
    padding:20px 38px;border-radius:18px;color:#fff;
    background:linear-gradient(120deg,#6366F1,#8B5CF6 50%,#06B6D4);
    box-shadow:0 20px 50px rgba(99,102,241,.45)}
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="grid-bg"></div>
  <div class="wrap">
    <div>
      <div class="logo">&lt;<span class="grad">DEV</span>/&gt; Веб-студия</div>
      <div class="pill"><span class="dot"></span> Принимаю заказы · Кыргызстан и удалённо</div>
    </div>

    <div class="mid">
      <h1>Сайты, CRM и<br><span class="grad">Telegram-сервисы</span><br>под ключ</h1>
      <div class="sub">Веб-разработка для бизнеса: от лендингов и магазинов до CRM, ботов и AI-автоматизации.</div>
      <div class="tags">
        <div class="tag">🌐 Сайты</div>
        <div class="tag">🛒 Магазины</div>
        <div class="tag">⚙️ CRM</div>
        <div class="tag">🤖 Telegram-боты</div>
        <div class="tag">✨ AI</div>
      </div>
    </div>

    <div class="footer">
      <div class="price"><span class="from">от</span> 15 000 сом <span class="from">· @username</span></div>
      <div class="cta">✈️ Написать</div>
    </div>
  </div>
</body>
</html>
